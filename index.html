<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Azkiya Farm | Link In Bio</title>
    
    <link rel="icon" href="logoazkiyafarm.png" type="image/png">
    <link rel="shortcut icon" href="logoazkiyafarm.png">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary-green: #408246; 
            --light-green: #e9f5e9;
            --text-dark: #2d3e2e;
            --white: #ffffff;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--light-green);
            color: var(--text-dark);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 480px;
            background-color: var(--white);
            border-radius: 20px;
            padding: 40px 20px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(64, 130, 70, 0.1);
        }

        .profile-img {
            width: 100%;
            max-width: 260px; /* Ukuran diperbesar agar proporsional dan gagah */
            height: auto;
            object-fit: contain;
            margin-bottom: 10px;
            /* Menggunakan drop-shadow agar bayangan mengikuti bentuk transparan PNG */
            filter: drop-shadow(0 8px 12px rgba(64, 130, 70, 0.25));
            transition: transform 0.3s ease;
        }

        .profile-img:hover {
            transform: scale(1.03); /* Efek interaktif elegan saat logo disentuh/disorot */
        }

        p.tagline {
            font-size: 0.95rem;
            color: #666;
            margin-bottom: 30px;
            font-weight: 600;
        }

        .links-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .link-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px 20px;
            background-color: var(--white);
            color: var(--primary-green);
            text-decoration: none;
            font-weight: 600;
            border: 2px solid var(--primary-green);
            border-radius: 50px;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .link-btn i {
            position: absolute;
            left: 25px;
            font-size: 1.3rem;
        }

        .link-btn:hover {
            background-color: var(--primary-green);
            color: var(--white);
            transform: translateY(-4px);
            box-shadow: 0 6px 15px rgba(64, 130, 70, 0.25);
        }

        .footer {
            margin-top: 35px;
            font-size: 0.8rem;
            color: #999;
        }
    </style>
</head>
<body>

    <div class="container">
        <img src="logoazkiyafarm.png" alt="Logo Azkiya Farm" class="profile-img">
        
        <p class="tagline">Sayuran Hidroponik Segar Langsung dari Kebun</p>

        <div class="links-container">
            <a href="https://wa.me/6285828701780" target="_blank" class="link-btn">
                <i class="fab fa-whatsapp"></i> Hubungi via WhatsApp
            </a>

            <a href="https://www.instagram.com/azkiyafarm_pky?utm_source=ig_web_button_share_sheet&igsh=ZDNlZDc0MzIxNw==" target="_blank" class="link-btn">
                <i class="fab fa-instagram"></i> Follow Instagram
            </a>

            <a href="https://www.facebook.com/share/1B4YPhPZbt/" target="_blank" class="link-btn">
                <i class="fab fa-facebook-f"></i> Kunjungi Facebook
            </a>

            <a href="https://www.tiktok.com/@azkiyafarm31?_r=1&_t=ZS-95k34UGI6Fh" target="_blank" class="link-btn">
                <i class="fab fa-tiktok"></i> Tonton di TikTok
            </a>

            <a href="https://maps.app.goo.gl/drZAwkkuuTzVFVYb8" target="_blank" class="link-btn">
                <i class="fas fa-map-marker-alt"></i> Alamat (Maps)
            </a>
        </div>

        <div class="footer">
            © 2026 Azkiya Farm.
        </div>
    </div>

</body>
</html>

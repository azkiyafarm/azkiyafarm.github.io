<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Azkiya Farm | Link In Bio</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            /* Palet warna disesuaikan dengan logo Azkiya Farm */
            --primary-green: #408246; 
            --light-green: #e9f5e9;
            --text-dark: #2d3e2e;
            --white: #ffffff;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--light-green);
            color: var(--text-dark);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 480px;
            background-color: var(--white);
            border-radius: 20px;
            padding: 40px 20px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(64, 130, 70, 0.1);
        }

        .profile-img {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid var(--primary-green);
            margin-bottom: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        h1 {
            font-size: 1.8rem;
            font-weight: 700;
            margin-bottom: 5px;
            color: var(--primary-green);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        p.tagline {
            font-size: 0.95rem;
            color: #666;
            margin-bottom: 30px;
        }

        .links-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .link-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px 20px;
            background-color: var(--white);
            color: var(--primary-green);
            text-decoration: none;
            font-weight: 600;
            border: 2px solid var(--primary-green);
            border-radius: 50px;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .link-btn i {
            position: absolute;
            left: 25px;
            font-size: 1.3rem;
        }

        /* Efek Animasi Hover */
        .link-btn:hover {
            background-color: var(--primary-green);
            color: var(--white);
            transform: translateY(-4px);
            box-shadow: 0 6px 15px rgba(64, 130, 70, 0.25);
        }

        .footer {
            margin-top: 35px;
            font-size: 0.8rem;
            color: #999;
        }
    </style>
</head>
<body>

    <div class="container">
        <img src="logo.jpg" alt="Logo Azkiya Farm" class="profile-img">
        
        <h1>Azkiya Farm</h1>
        <p class="tagline">Sayuran Hidroponik Segar Langsung dari Kebun</p>

        <div class="links-container">
            <a href="https://wa.me/6285828701780" target="_blank" class="link-btn">
                <i class="fab fa-whatsapp"></i> Hubungi via WhatsApp
            </a>

            <a href="https://www.instagram.com/azkiyafarm_pky?utm_source=ig_web_button_share_sheet&igsh=ZDNlZDc0MzIxNw==" target="_blank" class="link-btn">
                <i class="fab fa-instagram"></i> Follow Instagram
            </a>

            <a href="https://www.facebook.com/share/1B4YPhPZbt/" target="_blank" class="link-btn">
                <i class="fab fa-facebook-f"></i> Kunjungi Facebook
            </a>

            <a href="https://www.tiktok.com/@azkiyafarm31?_r=1&_t=ZS-95k34UGI6Fh" target="_blank" class="link-btn">
                <i class="fab fa-tiktok"></i> Tonton di TikTok
            </a>

            <a href="https://www.google.com/maps/search/?api=1&query=Jl.+Rajawali+IX+No+53" target="_blank" class="link-btn">
                <i class="fas fa-map-marker-alt"></i> Lokasi Kebun (Maps)
            </a>
        </div>

        <div class="footer">
            &copy; 2026 Azkiya Farm.
        </div>
    </div>

</body>
</html>
